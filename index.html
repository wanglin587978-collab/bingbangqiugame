<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <style>
    :root{
      --bg:#0b1220;
      --fg:#e6eef6;
      --accent:#4fd1c5;
      --muted:#5a6b7a;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    .wrap{height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071020 0%, #0b1220 100%)}
    canvas{background:radial-gradient(circle at 50% 20%, rgba(79,209,197,0.04), transparent 10%), linear-gradient(180deg,#08121b,#05101a); border:3px solid rgba(255,255,255,0.04); border-radius:8px; box-shadow:0 10px 30px rgba(2,6,23,0.8)}
    .ui{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:var(--fg);text-align:center;pointer-events:none}
    .controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:14px}
    .score {font-weight:700;letter-spacing:2px;font-size:18px; color:var(--fg)}
    .small{font-size:12px;color:var(--muted)}
    /* make page responsive */
    @media (max-width:700px){
      canvas{width:320px;height:200px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="position:relative">
      <div class="ui">
        <div class="score" id="scoreboard">Player 0 — 0 Computer</div>
        <div class="small" id="message">Use mouse or ↑/↓ to move left paddle. First to 10 wins.</div>
      </div>
      <canvas id="game" width="800" height="500"></canvas>
      <div class="controls">Controls: Mouse or Arrow Up/Down to move left paddle</div>
    </div>
  </div>

  <script>
    // Simple Pong implementation
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreboard = document.getElementById('scoreboard');
    const messageEl = document.getElementById('message');

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    // Game state
    let playerScore = 0;
    let computerScore = 0;
    const WIN_SCORE = 10;

    // Left paddle (player)
    const paddleWidth = 12;
    const paddleHeight = 90;
    const player = {
      x: 20,
      y: (HEIGHT - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 8,
      dy: 0 // used for keyboard movement
    };

    // Right paddle (computer)
    const computer = {
      x: WIDTH - 20 - paddleWidth,
      y: (HEIGHT - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 5 // max speed the computer can move per frame
    };

    // Ball
    const ballRadius = 9;
    const ball = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      vx: 0,
      vy: 0,
      speed: 3
    };

    let running = true;
    let paused = false;

    // Initialize ball with random direction
    function resetBall(direction = 1) {
      ball.x = WIDTH / 2;
      ball.y = HEIGHT / 2;
      // direction: 1 -> to right (player scored), -1 -> to left (computer scored)
      const angle = (Math.random() * Math.PI / 4) - (Math.PI / 8); // [-22.5deg, 22.5deg]
      ball.speed = 6;
      ball.vx = ball.speed * Math.cos(angle) * direction;
      ball.vy = ball.speed * Math.sin(angle);
    }

    resetBall(Math.random() > 0.5 ? 1 : -1);

    // Draw functions
    function drawNet() {
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      const seg = 16;
      for (let y = 0; y < HEIGHT; y += seg * 2) {
        ctx.fillRect((WIDTH / 2) - 1, y, 2, seg);
      }
    }

    function drawPaddle(p) {
      ctx.fillStyle = "#e6eef6";
      roundRect(ctx, p.x, p.y, p.width, p.height, 6);
    }

    function drawBall() {
      // ball shadow
      ctx.beginPath();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.ellipse(ball.x + 3, ball.y + 4, ballRadius + 2, ballRadius + 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // ball
      const g = ctx.createLinearGradient(ball.x - ballRadius, ball.y - ballRadius, ball.x + ballRadius, ball.y + ballRadius);
      g.addColorStop(0, "#b8fff3");
      g.addColorStop(1, "#2bb6ac");
      ctx.beginPath();
      ctx.fillStyle = g;
      ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
      ctx.fill();
    }

    function drawScore() {
      scoreboard.textContent = `Player ${playerScore} — ${computerScore} Computer`;
    }

    // Game loop
    let lastTime = performance.now();
    function loop(now) {
      if (!running) return;
      const dt = (now - lastTime) / 16.666; // ~60 FPS baseline
      lastTime = now;
      if (!paused) {
        update(dt);
      }
      render();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      // Update player paddle (keyboard)
      if (player.dy !== 0) {
        player.y += player.dy * player.speed * dt;
      }
      // Clamp player
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > HEIGHT) player.y = HEIGHT - player.height;

      // Computer AI: follow the ball with limited speed
      const targetY = ball.y - (computer.height / 2);
      const diff = targetY - computer.y;
      const move = Math.sign(diff) * Math.min(Math.abs(diff), computer.speed * dt);
      computer.y += move;
      // clamp computer
      if (computer.y < 0) computer.y = 0;
      if (computer.y + computer.height > HEIGHT) computer.y = HEIGHT - computer.height;

      // Move ball
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Wall collisions (top/bottom)
      if (ball.y - ballRadius < 0) {
        ball.y = ballRadius;
        ball.vy = -ball.vy;
      } else if (ball.y + ballRadius > HEIGHT) {
        ball.y = HEIGHT - ballRadius;
        ball.vy = -ball.vy;
      }

      // Paddle collisions
      // Player paddle
      if (ball.x - ballRadius < player.x + player.width && ball.x - ballRadius > player.x) {
        if (ball.y > player.y && ball.y < player.y + player.height) {
          // collision
          ball.x = player.x + player.width + ballRadius; // prevent sticking
          reflectFromPaddle(player);
        }
      }

      // Computer paddle
      if (ball.x + ballRadius > computer.x && ball.x + ballRadius < computer.x + computer.width) {
        if (ball.y > computer.y && ball.y < computer.y + computer.height) {
          ball.x = computer.x - ballRadius;
          reflectFromPaddle(computer, true);
        }
      }

      // Score (left and right edges)
      if (ball.x - ballRadius < 0) {
        // computer scored
        computerScore++;
        drawScore();
        if (computerScore >= WIN_SCORE) {
          endGame('Computer wins!');
          return;
        } else {
          pauseAndReset(-1); // ball goes left (to computer) after reset, so give direction -1 to send toward left? We want ball to go to the side of player who lost — send to player (right) so direction = 1.
          // Actually when player concedes (ball left), give ball to player (right): direction = 1
        }
      } else if (ball.x + ballRadius > WIDTH) {
        // player scored
        playerScore++;
        drawScore();
        if (playerScore >= WIN_SCORE) {
          endGame('You win!');
          return;
        } else {
          pauseAndReset( -1 ); // After player scores (ball went off right), send ball to left next: direction = -1
        }
      }
    }

    function reflectFromPaddle(paddle, isComputer=false) {
      // Compute hit position: -1 (top) to +1 (bottom)
      const relativeIntersectY = (paddle.y + paddle.height/2) - ball.y;
      const normalized = (relativeIntersectY / (paddle.height/2)); // -1..1
      // Bounce angle: multiply by max angle (in radians)
      const maxBounce = Math.PI / 3; // 60 degrees max
      const bounceAngle = normalized * maxBounce;

      // Determine direction: if paddle is player (left), ball goes right; if computer (right), ball goes left
      const direction = isComputer ? -1 : 1;

      // Speed increase slightly each hit
      ball.speed = Math.min(12, ball.speed + 0.5);

      ball.vx = ball.speed * Math.cos(bounceAngle) * direction;
      ball.vy = ball.speed * -Math.sin(bounceAngle);
    }

    let scorePauseTimeout = null;
    function pauseAndReset(nextDirection) {
      paused = true;
      // show small message
      messageEl.textContent = 'Point! Resetting...';
      clearTimeout(scorePauseTimeout);
      scorePauseTimeout = setTimeout(() => {
        resetBall(nextDirection);
        paused = false;
        messageEl.textContent = 'Use mouse or ↑/↓ to move left paddle. First to 10 wins.';
      }, 900);
    }

    function endGame(text) {
      running = false;
      paused = true;
      messageEl.textContent = text + ' Refresh page to play again.';
    }

    function render() {
      // clear
      ctx.clearRect(0,0,WIDTH,HEIGHT);

      drawNet();

      // draw paddles
      drawPaddle(player);
      drawPaddle(computer);

      // draw ball
      drawBall();

      // draw glow and scores are in DOM
      // draw subtle edges / reflection
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.rect(0,0,WIDTH,HEIGHT);
      ctx.stroke();
    }

    // Controls: Mouse movement over canvas to control left paddle
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      const mouseY = (e.clientY - rect.top) * scaleY;
      player.y = mouseY - player.height / 2;
      // clamp
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > HEIGHT) player.y = HEIGHT - player.height;
    });

    // Keyboard controls
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'Up') {
        player.dy = -1;
      } else if (e.key === 'ArrowDown' || e.key === 'Down') {
        player.dy = 1;
      } else if (e.key === ' '){ // space toggles pause
        paused = !paused;
        messageEl.textContent = paused ? 'Paused' : 'Use mouse or ↑/↓ to move left paddle. First to 10 wins.';
      }
    });
    window.addEventListener('keyup', (e) => {
      if ((e.key === 'ArrowUp' || e.key === 'Up') && player.dy === -1) player.dy = 0;
      if ((e.key === 'ArrowDown' || e.key === 'Down') && player.dy === 1) player.dy = 0;
    });

    // Touch support (drag left paddle)
    let ongoingTouch = null;
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        ongoingTouch = e.touches[0];
      }
    }, {passive:true});
    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const scaleY = canvas.height / rect.height;
        const touchY = (t.clientY - rect.top) * scaleY;
        player.y = touchY - player.height / 2;
        if (player.y < 0) player.y = 0;
        if (player.y + player.height > HEIGHT) player.y = HEIGHT - player.height;
      }
    }, {passive:true});

    // Start the loop
    drawScore();
    requestAnimationFrame(loop);

    // Expose some debug helpers in console (optional)
    window._pong = { player, computer, ball, resetBall };

  </script>
</body>
</html>
